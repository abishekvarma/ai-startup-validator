<!DOCTYPE html>
<html>
<head>
  <title>AI Startup Validator</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
      color: white;
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    input {
      width: 60%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      background: #ff7a18;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff3c00;
      transform: scale(1.05);
    }

    .card {
      background: white;
      color: black;
      margin: 20px auto;
      padding: 20px;
      border-radius: 12px;
      width: 80%;
      text-align: left;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    pre {
      white-space: pre-wrap;
      font-family: monospace;
    }

    .section-title {
      margin-top: 30px;
      font-size: 1.5rem;
      color: #ffd369;
    }
  </style>
</head>

<body>

  <h1>🚀 AI Startup Idea Validator</h1>

  <input id="ideaInput" placeholder="Enter your startup idea..." />

  <br>

  <button onclick="validateIdea()">Validate Idea</button>
  <button onclick="loadIdeas()">Show All Ideas</button>

  <div class="section-title">Result</div>
  <div id="result" class="card"></div>

  <div class="section-title">All Ideas</div>
  <div id="allIdeas"></div>

  <script>
    async function validateIdea() {
      const idea = document.getElementById("ideaInput").value;

      const res = await fetch("http://localhost:5000/validate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ idea })
      });

      const data = await res.json();

      document.getElementById("result").innerHTML = `
        <pre>${data.result}</pre>
      `;
    }

    async function loadIdeas() {
      const res = await fetch("http://localhost:5000/ideas");
      const data = await res.json();

      let html = "";

      data.reverse().forEach(item => {
        html += `
          <div class="card">
            <h3>💡 ${item.idea}</h3>
            <pre>${item.result}</pre>
          </div>
        `;
      });

      document.getElementById("allIdeas").innerHTML = html;
    }
  </script>

</body>
</html>
